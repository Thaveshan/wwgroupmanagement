<!DOCTYPE html>
<html>
<head>
    <title>WW Group - Add Car</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header><h1>WW Group - Add a New Car</h1></header>
<div class="container">
    <form method="POST">
        <input name="year" placeholder="Year" required>
        <input name="brand" placeholder="Brand" required>
        <input name="model" placeholder="Model" required>
        <input name="colour" placeholder="Colour">
        <input name="vin" placeholder="VIN Number">
        <input name="engine_number" placeholder="Engine Number">
        <input name="register_number" placeholder="Register Number">
        <input name="registration_number" placeholder="Registration Number">
        <input type="number" step="0.01" name="purchase_price" placeholder="Purchase Price" required>
        <input type="number" step="0.01" name="selling_price" placeholder="Selling Price" required>
        <button type="submit">Add Car</button>
    </form>
    <a href="/">← Back to Stock</a>
</div>
<footer>WW Group &copy; 2025</footer>
</body>
</html>

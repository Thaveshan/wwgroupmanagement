<!DOCTYPE html>
<html>
<head>
    <title>WW Group - Edit Car</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header><h1>WW Group - Car Stock Management</h1></header>
<div class="container">
    <a href="/add">+ Add Car</a> | <a href="/sold">View Sold Cars</a> | <a href="/stock">View Stock</a>
    
    <h2>Edit Car</h2>
    <form method="POST">
      <input name="year" value="{{ car.year }}" placeholder="Year" required>
      <input name="brand" value="{{ car.brand }}" placeholder="Brand" required>
      <input name="model" value="{{ car.model }}" placeholder="Model" required>
      <input name="colour" value="{{ car.colour }}" placeholder="Colour" required>
      <input name="vin" value="{{ car.vin }}" placeholder="VIN Number" required>
      <input name="engine_number" value="{{ car.engine_number }}" placeholder="Engine Number" required>
      <input name="register_number" value="{{ car.register_number }}" placeholder="Register Number" required>
      <input name="registration_number" value="{{ car.registration_number }}" placeholder="Registration Number" required>
      <input type="number" step="0.01" name="purchase_price" value="{{ car.purchase_price }}" placeholder="Purchase Price" required>
      <input type="number" step="0.01" name="selling_price" value="{{ car.selling_price }}" placeholder="Selling Price" required>
      <button type="submit">Update Car</button>
    </form>
</div>
<footer>WW Group &copy; 2025</footer>
</body>
</html>
